name: restore-home-fix-ai

on:
  push:
    paths:
      - .github/workflows/restore-home-fix-ai.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch AI routing and restore classic home UI
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          app_path = Path('app/app.py')
          app = app_path.read_text()

          ai_block = '''    "ai": [
                  "openai.com",
                  "chatgpt.com",
                  "oaistatic.com",
                  "oaiusercontent.com",
                  "anthropic.com",
                  "claude.ai",
                  "claudeusercontent.com",
                  "gemini.google.com",
                  "aistudio.google.com",
                  "ai.google.dev",
                  "generativelanguage.googleapis.com",
                  "makersuite.google.com",
                  "perplexity.ai",
                  "pplx.ai",
                  "copilot.microsoft.com",
                  "githubcopilot.com",
                  "x.ai",
                  "grok.com",
                  "deepseek.com",
                  "deepseek.ai",
                  "mistral.ai",
                  "mistralcdn.com",
                  "cohere.com",
                  "huggingface.co",
                  "hf.co",
                  "replicate.com",
              ],
              "google": ['''

          app, count = re.subn(
              r'    "ai": \[\n.*?\n    \],\n    "google": \[',
              ai_block,
              app,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('AI domain block was not found')

          old_rules = '''    rules: list[dict] = [{"ip_is_private": True, "outbound": "direct"}]
              rules.append({"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]})
              for key in ["ai", "youtube", "netflix", "tiktok", "telegram", "google"]:
                  rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}
          '''
          new_rules = '''    rules: list[dict] = [
                  {"action": "sniff", "timeout": "1s"},
                  {"ip_is_private": True, "outbound": "direct"},
                  {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},
                  {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},
              ]
              for key in ["youtube", "netflix", "tiktok", "telegram", "google"]:
                  rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}
          '''
          if old_rules not in app:
              raise SystemExit('Routing rule block was not found')
          app = app.replace(old_rules, new_rules, 1)
          app_path.write_text(app)

          old_css = subprocess.check_output(
              ['git', 'show', 'a88fea28210db9ff588216a8bebcf21cd5cf4e02:app/static/style.css'],
              text=True,
          ).strip()
          extras = r'''
          :root{--accent-soft:#edf3ff}
          button,input,select,textarea{font:inherit}
          textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--card);color:var(--text);outline:none;resize:vertical;line-height:1.5;min-height:210px}
          input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(36,107,253,.12)}
          button:disabled{opacity:.6;cursor:not-allowed}
          .title>div h2{margin-bottom:4px}.title>div p{margin:0}
          .support-line{margin:12px 0 14px;padding:10px 12px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);font-size:13px}
          .node-list{display:grid;gap:10px}
          .node-card{display:grid;grid-template-columns:minmax(0,1fr) minmax(160px,.8fr) auto;gap:14px;align-items:center}
          .node-main{display:flex;align-items:center;gap:12px;min-width:0}
          .protocol{display:inline-flex;align-items:center;justify-content:center;min-width:68px;padding:7px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:12px}
          .node-title{display:grid;gap:4px;min-width:0}
          .node-title b,.node-title span,.node-source{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
          .node-title span,.node-source{color:var(--muted);font-size:13px}
          .node-actions{display:flex;gap:7px}.node-actions button{padding:9px 11px}
          .empty{display:grid;gap:7px;text-align:center;padding:34px}
          .modal{position:fixed;inset:0;background:rgba(15,23,42,.56);display:grid;place-items:center;padding:18px;z-index:20}
          .modal-card{width:min(720px,100%);max-height:calc(100vh - 36px);overflow:auto}
          .modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
          .modal-head h2{margin:0 0 6px}.modal-head p{margin:0}
          .icon{width:42px;height:42px;padding:0;font-size:24px;line-height:1}
          .check-row{display:flex;align-items:center;gap:9px;margin:12px 0;color:var(--muted)}.check-row input{width:auto}
          .modal-actions{display:flex;justify-content:flex-end;gap:9px}.modal-actions button{min-width:110px}
          @media(prefers-color-scheme:dark){:root{--accent-soft:#16294d}}
          @media(max-width:760px){.title>div p{display:none}.node-card{grid-template-columns:1fr}.node-source{order:2}.node-actions{order:3;display:grid;grid-template-columns:repeat(3,1fr)}.node-actions button{width:100%}.modal{padding:10px}.modal-card{max-height:calc(100vh - 20px);padding:15px}}
          @media(max-width:420px){.grid{grid-template-columns:1fr}.title{gap:8px}.title button{padding:10px 12px}.protocol{min-width:58px}.row{align-items:flex-start;flex-direction:column}.row select{width:100%}footer{gap:10px}footer span{max-width:56%}}
          '''
          Path('app/static/style.css').write_text(old_css + extras)
          PY

      - name: Validate changes
        run: |
          python -m py_compile app/app.py app/importers.py
          bash -n install.sh
          python - <<'PY'
          from pathlib import Path
          app = Path('app/app.py').read_text()
          css = Path('app/static/style.css').read_text()
          assert '{"action": "sniff", "timeout": "1s"}' in app
          assert 'generativelanguage.googleapis.com' in app
          assert 'githubcopilot.com' in app
          assert '.modal-card' in css
          assert 'grid-template-columns:repeat(4,1fr)' in css
          PY

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/app.py app/static/style.css
          git commit -m "fix: repair AI routing and restore classic home UI"
          git push
