name: panel-ci

on:
  push:
    paths:
      - "panel/**"
      - "panel-release.json"
      - "install.sh"
      - "install-panel-stable.sh"
      - "install-panel-v71.sh"
      - "install-panel-v712.sh"
      - "install-panel.sh"
      - "install-panel-v6.sh"
      - "install-web.sh"
      - "install-gateway.sh"
      - "release/**"
      - "tools/**"
      - "deploy/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/panel-ci.yml"
  pull_request:
    paths:
      - "panel/**"
      - "panel-release.json"
      - "install.sh"
      - "install-panel-stable.sh"
      - "install-panel-v71.sh"
      - "install-panel-v712.sh"
      - "install-panel.sh"
      - "install-panel-v6.sh"
      - "install-web.sh"
      - "install-gateway.sh"
      - "release/**"
      - "tools/**"
      - "deploy/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/panel-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Shell syntax and verified public transport
        run: |
          bash -n install.sh
          bash -n install-panel-stable.sh
          bash -n install-panel-v71.sh
          bash -n install-panel-v712.sh
          bash -n install-panel.sh
          bash -n install-panel-v6.sh
          bash -n install-web.sh
          bash -n install-gateway.sh
          ! grep -q "api.github.com" install-panel-stable.sh
          grep -q "raw.githubusercontent.com" install-panel-stable.sh
          grep -q "cdn.jsdelivr.net" install-panel-stable.sh
          grep -q 'INSTALLER_REF="7f8fd3dce1ea6b94d860ca5040f5a695f825dbe8"' install-panel-stable.sh
          grep -q 'INSTALLER_SHA256="9bcd87ef9a244de5c5b0a4490b64b68d19354908c41c49bb03cc2796fd016db0"' install-panel-stable.sh
          grep -q 'install-panel-v712.sh' install-panel-stable.sh
          grep -q 'IWAN_INSTALLER_REF="$INSTALLER_REF"' install-panel-stable.sh
          grep -q "pkeyutl" install-panel-v71.sh
          grep -q -- "--rollback" install-panel-v71.sh
          grep -q 'PANEL_BIND:-0.0.0.0' install-panel-v712.sh
          grep -q 'IWAN_ALLOW_PUBLIC_BIND:-1' install-panel-v712.sh
          grep -q 'chown -R "$PANEL_USER:$PANEL_GROUP" "$DATA_DIR"' install-panel-v712.sh
          grep -q 'ufw allow "${PANEL_PORT}/tcp"' install-panel-v712.sh
          grep -q "RuntimeDirectoryMode=0755" install-panel-v71.sh
          grep -q "LEGACY_DIR=" install-panel-v71.sh
          grep -q "runtime_v712" panel/gateway/entrypoint.py
          grep -q "helper 拒绝启动" panel/gateway/entrypoint.py

      - name: Verify public neutral fresh installer
        run: |
          ! grep -Eqi 'hkboil|217\.116\.172\.44|HKT_PASSWORD|SG_PASSWORD|IWAN_USERNAME=.*hkl' install.sh
          grep -q '"inbounds": \[\]' install.sh
          grep -q '"final": "direct"' install.sh
          grep -q 'install-web.sh' install.sh
          grep -q '不会预设 HKT、SG、用户名或任何业务密码' install.sh

      - name: Python syntax
        run: |
          python -m py_compile \
            panel/app.py panel/iwan_compat.py \
            panel/v62/app.py panel/v63/app.py panel/v64/app.py \
            panel/v65/app.py panel/v66/app.py panel/v67/app.py \
            panel/v68/app.py panel/v69/app.py panel/v70/app.py \
            panel/gateway/*.py \
            tools/repair_iwan_schema.py tools/release_manifest.py tools/build_release_manifest.py \
            tests/test_iwan_compat.py tests/test_gateway_v71.py tests/test_gateway_v712.py

      - name: Core and architecture unit tests
        run: |
          cd panel
          python tests/test_panel.py PanelTests.test_import_json_outbounds -v
          python tests/test_panel.py PanelTests.test_parse_ss_link -v
          python tests/test_panel.py PanelTests.test_patch_flat_credentials -v
          python tests/test_panel.py PanelTests.test_patch_iwan_preserves_blank_password -v
          python tests/test_panel.py PanelTests.test_public_iwan_redacts_password -v
          cd ..
          python tests/test_iwan_compat.py
          python -m unittest tests.test_gateway_v71 -v
          python -m unittest tests.test_gateway_v712 -v

      - name: JavaScript syntax
        run: |
          node --check panel/web/app.js
          node --check panel/web/remember.js
          node --check panel/v62/web/app.js
          node --check panel/v63/web/remember.js
          node --check panel/v64/web/interaction.js
          node --check panel/v65/web/refreshfix.js
          node --check panel/v68/web/autosave.js

      - name: Assemble and self-test unified v7.1.2 candidate
        run: |
          python - <<'PY'
          import pathlib, shutil, subprocess, tempfile
          with tempfile.TemporaryDirectory() as td:
              root=pathlib.Path(td,'release'); root.mkdir()
              shutil.copy2('panel/gateway/entrypoint.py',root/'app.py')
              shutil.copy2('panel/app.py',root/'core.py')
              shutil.copy2('panel/iwan_compat.py',root/'iwan_compat.py')
              shutil.copytree('panel/gateway',root/'gateway')
              web=root/'web'; web.mkdir()
              files={
                  'panel/web/index.html':'index.html',
                  'panel/web/app.css':'app.css',
                  'panel/web/app.js':'app.js',
                  'panel/web/remember.css':'remember.css',
                  'panel/web/remember.js':'remember.js',
              }
              for source,target in files.items(): shutil.copy2(source,web/target)
              html=(web/'index.html').read_text(encoding='utf-8')
              assert '/assets/app.css' in html and '/assets/app.js' in html
              assert all('/v6' not in source for source in files)
              subprocess.check_call(['python',str(root/'app.py'),'--self-test'])
              forbidden=('reliablecore','autosavecore','routingcore','statuscore','interactioncore','authcore','moscore')
              runtime='\n'.join(path.read_text(encoding='utf-8') for path in (root/'gateway').glob('*.py'))
              assert not any(f'import {name}' in runtime or f'from {name}' in runtime for name in forbidden)
          print('unified v7.1.2 candidate self-test passed')
          PY

      - name: Verify signed immutable release manifest
        run: |
          python tools/release_manifest.py verify panel-release.json release/iwan-release-ed25519-public.pem
          python - <<'PY'
          import hashlib, json, pathlib, re, subprocess
          manifest=json.load(open('panel-release.json',encoding='utf-8'))
          ref=manifest['ref']; files=manifest['files']
          assert manifest['schema']==2
          assert manifest['version']=='7.1.2'
          assert ref=='7f8fd3dce1ea6b94d860ca5040f5a695f825dbe8'
          assert manifest['architecture']=='flat-package+root-helper'
          assert isinstance(files,list) and 20 <= len(files) <= 40
          assert len({item['target'] for item in files}) == len(files)
          assert any(item['source']=='panel/gateway/entrypoint.py' and item['target']=='app.py' for item in files)
          assert any(item['source']=='panel/gateway/runtime_v712.py' and item['target']=='gateway/runtime_v712.py' for item in files)
          assert any(item['source']=='install-panel-v712.sh' and item['target']=='install-panel-v71.sh' for item in files)
          assert any(item['source']=='panel/web/index.html' and item['target']=='web/index.html' for item in files)
          assert not any(item['source'].startswith('panel/v6') for item in files)
          for item in files:
              assert '..' not in item['source'].split('/')
              assert '..' not in item['target'].split('/')
              assert item['mode'] in ('0644','0755')
              assert re.fullmatch(r'[0-9a-f]{64}',item['sha256'])
              data=subprocess.check_output(['git','show',f"{ref}:{item['source']}"])
              assert len(data)==item['size'], (item['source'],len(data),item['size'])
              assert hashlib.sha256(data).hexdigest()==item['sha256'], item['source']
              blob=hashlib.sha1(b'blob '+str(len(data)).encode()+b'\0'+data).hexdigest()
              assert blob==item['git_blob'], (item['source'],blob,item['git_blob'])
          bootstrap=pathlib.Path('install-panel-stable.sh').read_text(encoding='utf-8')
          installer=next(item for item in files if item['source']=='install-panel-v712.sh')
          assert f'INSTALLER_REF="{ref}"' in bootstrap
          assert f'INSTALLER_SHA256="{installer["sha256"]}"' in bootstrap
          print('signed manifest verified:',manifest['version'],ref[:12],len(files),'files')
          PY

      - name: Assemble and self-test signed stable release
        run: |
          python - <<'PY'
          import json, pathlib, subprocess, tempfile
          manifest=json.load(open('panel-release.json',encoding='utf-8'))
          with tempfile.TemporaryDirectory() as td:
              root=pathlib.Path(td,'release'); root.mkdir()
              for item in manifest['files']:
                  data=subprocess.check_output(['git','show',f"{manifest['ref']}:{item['source']}"])
                  target=root/item['target']; target.parent.mkdir(parents=True,exist_ok=True)
                  target.write_bytes(data); target.chmod(int(item['mode'],8))
              for required in ('app.py','core.py','gateway/helper.py','gateway/runtime.py','gateway/runtime_v712.py','web/index.html','web/app.css','web/app.js','web/remember.js'):
                  assert (root/required).is_file(), required
              subprocess.check_call(['python',str(root/'app.py'),'--self-test'])
          print('signed stable release self-test passed')
          PY

      - name: Simulate verified fixed-ref downloads
        run: |
          python - <<'PY'
          import hashlib, json, pathlib, subprocess, tempfile
          manifest=json.load(open('panel-release.json',encoding='utf-8'))
          with tempfile.TemporaryDirectory() as td:
              root=pathlib.Path(td)
              for item in manifest['files']:
                  data=subprocess.check_output(['git','show',f"{manifest['ref']}:{item['source']}"])
                  assert len(data)==item['size']
                  assert hashlib.sha256(data).hexdigest()==item['sha256']
                  actual=hashlib.sha1(b'blob '+str(len(data)).encode()+b'\0'+data).hexdigest()
                  assert item['git_blob']==actual
                  target=root/item['target']; target.parent.mkdir(parents=True,exist_ok=True); target.write_bytes(data)
          print('fixed-ref download verification path passed')
          PY
