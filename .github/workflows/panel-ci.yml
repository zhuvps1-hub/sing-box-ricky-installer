name: panel-ci

on:
  push:
    paths:
      - "panel/**"
      - "panel-release.json"
      - "install-panel.sh"
      - "install-panel-v6.sh"
      - "install-web.sh"
      - "install-gateway.sh"
      - ".github/workflows/panel-ci.yml"
  pull_request:
    paths:
      - "panel/**"
      - "panel-release.json"
      - "install-panel.sh"
      - "install-panel-v6.sh"
      - "install-web.sh"
      - "install-gateway.sh"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Shell syntax
        run: |
          bash -n install-panel.sh
          bash -n install-panel-v6.sh
          bash -n install-web.sh
          bash -n install-gateway.sh
      - name: Python syntax and unit tests
        run: |
          python -m py_compile panel/app.py
          cd panel
          python -m unittest discover -s tests -v
      - name: JavaScript syntax
        run: node --check panel/web/app.js
      - name: Verify immutable release manifest
        run: |
          python - <<'PY'
          import hashlib, json, re, subprocess
          manifest=json.load(open('panel-release.json',encoding='utf-8'))
          ref=manifest['ref']
          assert re.fullmatch(r'[0-9a-f]{40}',ref)
          for item in manifest['files']:
              data=subprocess.check_output(['git','show',f"{ref}:{item['source']}"])
              actual=hashlib.sha1(b'blob '+str(len(data)).encode()+b'\0'+data).hexdigest()
              assert actual == item['git_blob'], (item['source'], actual, item['git_blob'])
          print('manifest verified')
          PY
      - name: Simulate API base64 decode and blob verification
        run: |
          python - <<'PY'
          import base64, hashlib, json, pathlib, subprocess, tempfile
          manifest=json.load(open('panel-release.json',encoding='utf-8'))
          with tempfile.TemporaryDirectory() as td:
              for item in manifest['files']:
                  data=subprocess.check_output(['git','show',f"{manifest['ref']}:{item['source']}"])
                  api={'sha':item['git_blob'],'encoding':'base64','content':base64.b64encode(data).decode()}
                  decoded=base64.b64decode(api['content'],validate=True)
                  actual=hashlib.sha1(b'blob '+str(len(decoded)).encode()+b'\0'+decoded).hexdigest()
                  assert api['sha']==item['git_blob']==actual
                  target=pathlib.Path(td,item['target']); target.parent.mkdir(parents=True,exist_ok=True); target.write_bytes(decoded)
          print('API decode path verified')
          PY
