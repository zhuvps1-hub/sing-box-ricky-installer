name: gateway-v8

on:
  pull_request:
    paths:
      - "panel/**"
      - "tests/test_gateway_v8.py"
      - ".github/workflows/gateway-v8.yml"
  push:
    paths:
      - "panel/**"
      - "tests/test_gateway_v8.py"
      - ".github/workflows/gateway-v8.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax and tests
        run: |
          python -m py_compile panel/gateway/runtime_v8.py panel/gateway/entrypoint.py tests/test_gateway_v8.py
          python -m unittest tests.test_gateway_v8 -v
      - name: JavaScript and CSS assets
        run: |
          node --check panel/web/v8.js
          test -s panel/web/v8.css
          grep -q 'action.*route' panel/gateway/runtime_v8.py
          grep -q 'action.*sniff' panel/gateway/runtime_v8.py
          grep -q 'Expires=' panel/gateway/runtime_v8.py
      - name: Flat runtime self test
        run: |
          tmp="$(mktemp -d)"
          cp panel/gateway/entrypoint.py "$tmp/app.py"
          cp panel/app.py "$tmp/core.py"
          cp panel/iwan_compat.py "$tmp/iwan_compat.py"
          cp -a panel/gateway "$tmp/gateway"
          cp -a panel/web "$tmp/web"
          python "$tmp/app.py" --self-test
