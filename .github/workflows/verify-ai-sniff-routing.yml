name: verify-ai-sniff-routing

on:
  push:

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch only AI routing logic
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app/app.py')
          text = path.read_text()

          match = re.search(
              r'(?P<prefix>    "ai": \[\n)(?P<body>.*?)(?P<suffix>\n    \],\n    "google": \[)',
              text,
              flags=re.S,
          )
          if not match:
              raise SystemExit('AI domain block not found; refusing to modify unrelated code')

          body = match.group('body')
          for domain in [
              'claude.com',
              'generativelanguage.googleapis.com',
              'aistudio.google.com',
              'bard.google.com',
              'githubcopilot.com',
          ]:
              if f'"{domain}"' not in body:
                  body += f'\n        "{domain}",'
          text = text[:match.start()] + match.group('prefix') + body + match.group('suffix') + text[match.end():]

          old_rules = (
              '    rules: list[dict] = [{"ip_is_private": True, "outbound": "direct"}]\n'
              '    rules.append({"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]})\n'
              '    for key in ["ai", "youtube", "netflix", "tiktok", "telegram", "google"]:\n'
              '        rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}'
          )
          new_rules = (
              '    rules: list[dict] = [\n'
              '        {"action": "sniff"},\n'
              '        {"ip_is_private": True, "outbound": "direct"},\n'
              '        {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},\n'
              '        {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},\n'
              '    ]\n'
              '    for key in ["youtube", "netflix", "tiktok", "telegram", "google"]:\n'
              '        rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}'
          )
          if old_rules in text:
              text = text.replace(old_rules, new_rules, 1)
          elif '{"action": "sniff"}' not in text:
              raise SystemExit('Routing block not found; refusing to modify unrelated code')

          path.write_text(text)
          PY

      - name: Python and shell syntax checks
        run: |
          python -m py_compile app/app.py app/importers.py
          bash -n install.sh

      - name: Build representative iWAN config
        env:
          PYTHONPATH: app
          IWAN_DATA: /tmp/iwan-gateway-test
        run: |
          python - <<'PY'
          import json
          import app as gateway

          routing = {key: 'direct' for key in gateway.CATS}
          routing['ai'] = 'SG'
          routing['default'] = 'direct'
          state = {
              'nodes': [{
                  'tag': 'SG',
                  'type': 'shadowsocks',
                  'server': '127.0.0.1',
                  'port': 443,
                  'outbound': {
                      'type': 'shadowsocks',
                      'server': '127.0.0.1',
                      'server_port': 443,
                      'method': 'aes-128-gcm',
                      'password': 'verification-password',
                  },
                  'source': 'CI verification',
              }],
              'routing': routing,
              'iwan': {
                  'enabled': True,
                  'listen': '::',
                  'port': 8000,
                  'pool': '10.10.10.0/24',
                  'mtu': 1400,
                  'username': '',
                  'password': '',
              },
          }
          config = gateway.build(state)
          rules = config['route']['rules']
          assert rules[0] == {'action': 'sniff'}
          assert rules[1] == {'ip_is_private': True, 'outbound': 'direct'}
          assert rules[2] == {'rule_set': ['geosite-cn', 'geoip-cn'], 'outbound': 'direct'}
          assert rules[3]['domain_suffix'] == gateway.DOMAINS['ai']
          assert rules[3]['outbound'] == 'SG'
          assert 'generativelanguage.googleapis.com' in gateway.DOMAINS['ai']
          assert 'githubcopilot.com' in gateway.DOMAINS['ai']
          with open('/tmp/ai-routing-config.json', 'w') as fh:
              json.dump(config, fh, ensure_ascii=False, indent=2)
          PY

      - name: Validate with Ricky-Hao sing-box with_iwan
        run: |
          curl -fL --retry 3 -o /tmp/sing-box.tar.gz \
            https://github.com/Ricky-Hao/sing-box/releases/download/v1.13.13-rickyhao.22/sing-box-1.13.13-rickyhao.22-linux-amd64.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          SB_BIN=$(find /tmp -type f -name sing-box | head -n 1)
          test -n "$SB_BIN"
          chmod +x "$SB_BIN"
          "$SB_BIN" version | tee /tmp/sing-box-version.txt
          grep -qi 'with_iwan' /tmp/sing-box-version.txt
          timeout 30s "$SB_BIN" check -c /tmp/ai-routing-config.json

      - name: Ensure only app.py changed
        run: |
          test "$(git diff --name-only | tr -d '\r')" = "app/app.py"
          git diff --check

      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/app.py
          git commit -m "fix: sniff real domains for AI routing"
          git push
