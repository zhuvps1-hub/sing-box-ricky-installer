name: verify-ai-sniff-routing

on:
  push:

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch, validate, and record result
        env:
          PYTHONPATH: app
          IWAN_DATA: /tmp/iwan-gateway-test
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          import re
          import subprocess
          import sys
          import traceback

          app_path = Path('app/app.py')
          original = app_path.read_text()
          logs = []

          def run(command, timeout=120):
              logs.append('$ ' + ' '.join(command))
              result = subprocess.run(
                  command,
                  text=True,
                  capture_output=True,
                  timeout=timeout,
              )
              if result.stdout:
                  logs.append(result.stdout.strip())
              if result.stderr:
                  logs.append(result.stderr.strip())
              if result.returncode:
                  raise RuntimeError(f'command failed with exit code {result.returncode}')
              return result

          success = False
          try:
              text = original
              match = re.search(
                  r'(?P<prefix>    "ai": \[\n)(?P<body>.*?)(?P<suffix>\n    \],\n    "google": \[)',
                  text,
                  flags=re.S,
              )
              if not match:
                  raise RuntimeError('AI domain block not found')

              body = match.group('body')
              for domain in [
                  'claude.com',
                  'generativelanguage.googleapis.com',
                  'aistudio.google.com',
                  'bard.google.com',
                  'githubcopilot.com',
              ]:
                  if f'"{domain}"' not in body:
                      body += f'\n        "{domain}",'
              text = text[:match.start()] + match.group('prefix') + body + match.group('suffix') + text[match.end():]

              old_rules = (
                  '    rules: list[dict] = [{"ip_is_private": True, "outbound": "direct"}]\n'
                  '    rules.append({"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]})\n'
                  '    for key in ["ai", "youtube", "netflix", "tiktok", "telegram", "google"]:\n'
                  '        rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}'
              )
              new_rules = (
                  '    rules: list[dict] = [\n'
                  '        {"action": "sniff"},\n'
                  '        {"ip_is_private": True, "outbound": "direct"},\n'
                  '        {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},\n'
                  '        {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},\n'
                  '    ]\n'
                  '    for key in ["youtube", "netflix", "tiktok", "telegram", "google"]:\n'
                  '        rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}'
              )
              if old_rules in text:
                  text = text.replace(old_rules, new_rules, 1)
              elif '{"action": "sniff"}' not in text:
                  raise RuntimeError('routing block not found')

              app_path.write_text(text)
              run(['python', '-m', 'py_compile', 'app/app.py', 'app/importers.py'])
              run(['bash', '-n', 'install.sh'])

              sys.path.insert(0, 'app')
              import app as gateway

              routing = {key: 'direct' for key in gateway.CATS}
              routing['ai'] = 'SG'
              routing['default'] = 'direct'
              state = {
                  'nodes': [{
                      'tag': 'SG',
                      'type': 'shadowsocks',
                      'server': '127.0.0.1',
                      'port': 443,
                      'outbound': {
                          'type': 'shadowsocks',
                          'server': '127.0.0.1',
                          'server_port': 443,
                          'method': 'aes-128-gcm',
                          'password': 'verification-password',
                      },
                      'source': 'CI verification',
                  }],
                  'routing': routing,
                  'iwan': {
                      'enabled': True,
                      'listen': '::',
                      'port': 8000,
                      'pool': '10.10.10.0/24',
                      'mtu': 1400,
                      'username': '',
                      'password': '',
                  },
              }
              config = gateway.build(state)
              rules = config['route']['rules']
              assert rules[0] == {'action': 'sniff'}
              assert rules[1] == {'ip_is_private': True, 'outbound': 'direct'}
              assert rules[2] == {'rule_set': ['geosite-cn', 'geoip-cn'], 'outbound': 'direct'}
              assert rules[3]['domain_suffix'] == gateway.DOMAINS['ai']
              assert rules[3]['outbound'] == 'SG'
              Path('/tmp/ai-routing-config.json').write_text(json.dumps(config, ensure_ascii=False, indent=2))

              run([
                  'curl', '-fL', '--retry', '3', '-o', '/tmp/sing-box.tar.gz',
                  'https://github.com/Ricky-Hao/sing-box/releases/download/v1.13.13-rickyhao.22/sing-box-1.13.13-rickyhao.22-linux-amd64.tar.gz',
              ])
              run(['tar', '-xzf', '/tmp/sing-box.tar.gz', '-C', '/tmp'])
              binaries = list(Path('/tmp').rglob('sing-box'))
              if not binaries:
                  raise RuntimeError('sing-box binary not found after extraction')
              binary = binaries[0]
              binary.chmod(0o755)
              version = run([str(binary), 'version']).stdout
              if 'with_iwan' not in version.lower():
                  raise RuntimeError('downloaded binary does not contain with_iwan tag')
              run(['timeout', '30s', str(binary), 'check', '-c', '/tmp/ai-routing-config.json'], timeout=40)
              success = True
              logs.append('AI routing validation passed')
          except Exception:
              logs.append(traceback.format_exc())
              app_path.write_text(original)

          marker = Path('.github/ai-routing-validation.txt')
          marker.write_text(('status=success\n' if success else 'status=failure\n') + '\n'.join(logs) + '\n')

          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
          subprocess.run(['git', 'add', 'app/app.py', str(marker)], check=True)
          message = 'fix: sniff real domains for AI routing' if success else 'test: record AI routing validation failure'
          subprocess.run(['git', 'commit', '-m', message], check=True)
          subprocess.run(['git', 'push'], check=True)
          PY
