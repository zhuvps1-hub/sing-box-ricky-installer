name: apply-known-working-ai-routing

on:
  push:
    paths:
      - .github/workflows/apply-known-working-ai-routing.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply the confirmed minimal AI routing fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/app.py')
          text = path.read_text()

          old_domains = '''    "ai": [
                  "openai.com",
                  "chatgpt.com",
                  "oaistatic.com",
                  "oaiusercontent.com",
                  "anthropic.com",
                  "claude.ai",
                  "gemini.google.com",
                  "perplexity.ai",
                  "copilot.microsoft.com",
              ],
          '''.replace('              ', '')
          new_domains = '''    "ai": [
                  "openai.com",
                  "chatgpt.com",
                  "oaistatic.com",
                  "oaiusercontent.com",
                  "anthropic.com",
                  "claude.ai",
                  "claude.com",
                  "gemini.google.com",
                  "generativelanguage.googleapis.com",
                  "aistudio.google.com",
                  "bard.google.com",
                  "perplexity.ai",
                  "copilot.microsoft.com",
                  "githubcopilot.com",
              ],
          '''.replace('              ', '')

          old_rules = '''    rules: list[dict] = [
                  {"inbound": ["iwan-in"], "port": 53, "action": "hijack-dns"},
                  {"ip_is_private": True, "outbound": "direct"},
                  {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},
                  {"rule_set": "geosite-ai", "outbound": routing["ai"]},
                  {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},
              ]
          '''.replace('              ', '')
          new_rules = '''    rules: list[dict] = [
                  {"action": "sniff"},
                  {"ip_is_private": True, "outbound": "direct"},
                  {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},
                  {"rule_set": "geosite-ai", "outbound": routing["ai"]},
                  {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},
              ]
          '''.replace('              ', '')

          old_dns = '''        "dns": {
                      "servers": [{"type": "local", "tag": "dns-upstream", "prefer_go": True}],
                      "final": "dns-upstream",
                      "strategy": "prefer_ipv4",
                      "reverse_mapping": True,
                  },
          '''.replace('              ', '')

          for label, old in (("AI domain block", old_domains), ("routing block", old_rules), ("DNS block", old_dns)):
              if old not in text:
                  raise SystemExit(f'{label} not found; refusing unrelated changes')

          text = text.replace(old_domains, new_domains, 1)
          text = text.replace(old_rules, new_rules, 1)
          text = text.replace(old_dns, '', 1)
          path.write_text(text)
          PY

      - name: Syntax and scope checks
        run: |
          python -m py_compile app/app.py app/importers.py
          bash -n install.sh
          git diff --check
          test "$(git diff --name-only | tr -d '\r')" = "app/app.py"

      - name: Build representative HK default, SG AI and TG routing config
        env:
          PYTHONPATH: app
          IWAN_DATA: /tmp/iwan-gateway-test
        run: |
          python - <<'PY'
          import json
          import app as gateway

          routing = {key: 'HK' for key in gateway.CATS}
          routing['ai'] = 'SG'
          routing['telegram'] = 'TG'
          state = {
              'nodes': [
                  {
                      'tag': tag,
                      'type': 'shadowsocks',
                      'server': '127.0.0.1',
                      'port': port,
                      'outbound': {
                          'type': 'shadowsocks',
                          'server': '127.0.0.1',
                          'server_port': port,
                          'method': 'aes-128-gcm',
                          'password': 'verification-password',
                      },
                      'source': 'CI verification',
                  }
                  for tag, port in [('HK', 1443), ('SG', 2443), ('TG', 3443)]
              ],
              'routing': {**routing, 'default': 'HK'},
              'iwan': {
                  'enabled': True,
                  'listen': '::',
                  'port': 8000,
                  'pool': '10.10.10.0/24',
                  'mtu': 1400,
                  'username': 'verification-user',
                  'password': 'verification-password',
              },
          }
          config = gateway.build(state)
          rules = config['route']['rules']
          assert rules[0] == {'action': 'sniff'}
          assert not any(rule.get('action') == 'hijack-dns' for rule in rules)
          assert 'dns' not in config
          assert config['route']['final'] == 'HK'
          assert next(rule for rule in rules if rule.get('rule_set') == 'geosite-ai')['outbound'] == 'SG'
          assert next(rule for rule in rules if rule.get('domain_suffix') == gateway.DOMAINS['ai'])['outbound'] == 'SG'
          assert next(rule for rule in rules if rule.get('ip_cidr') == gateway.TG_CIDR)['outbound'] == 'TG'
          for domain in ('claude.com', 'githubcopilot.com', 'generativelanguage.googleapis.com', 'aistudio.google.com', 'bard.google.com'):
              assert domain in gateway.DOMAINS['ai']
          with open('/tmp/known-working-ai-routing.json', 'w') as fh:
              json.dump(config, fh, ensure_ascii=False, indent=2)
          PY

      - name: Validate rule-set and Ricky-Hao with_iwan core
        run: |
          curl -fL --retry 3 -o /tmp/category-ai.srs \
            'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-ai-!cn.srs'
          test -s /tmp/category-ai.srs
          curl -fL --retry 3 -o /tmp/sing-box.tar.gz \
            https://github.com/Ricky-Hao/sing-box/releases/download/v1.13.13-rickyhao.22/sing-box-1.13.13-rickyhao.22-linux-amd64.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          SB_BIN=$(find /tmp -type f -name sing-box | head -n 1)
          chmod +x "$SB_BIN"
          "$SB_BIN" version | tee /tmp/sing-box-version.txt
          grep -q 'with_iwan' /tmp/sing-box-version.txt
          timeout 30s "$SB_BIN" check -c /tmp/known-working-ai-routing.json

      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/app.py
          git commit -m "fix: restore proven sniff-based AI routing"
          git push
