name: gateway-v71

on:
  push:
    paths:
      - "panel/gateway/**"
      - "panel/web/**"
      - "panel/iwan_compat.py"
      - "tests/test_gateway_v71.py"
      - "tests/test_gateway_v712.py"
      - "install-panel-v71.sh"
      - "install-panel-v712.sh"
      - "tools/release_manifest.py"
      - "tools/build_release_manifest.py"
      - "release/**"
      - "deploy/**"
      - "docs/部署与安全-v7.1.md"
      - ".github/workflows/gateway-v71-ci.yml"
  pull_request:
    paths:
      - "panel/gateway/**"
      - "panel/web/**"
      - "panel/iwan_compat.py"
      - "tests/test_gateway_v71.py"
      - "tests/test_gateway_v712.py"
      - "install-panel-v71.sh"
      - "install-panel-v712.sh"
      - "tools/release_manifest.py"
      - "tools/build_release_manifest.py"
      - "release/**"
      - "deploy/**"
      - "docs/部署与安全-v7.1.md"
      - ".github/workflows/gateway-v71-ci.yml"

jobs:
  architecture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile flat package
        run: |
          python -m py_compile panel/iwan_compat.py panel/app.py panel/gateway/*.py tools/release_manifest.py tools/build_release_manifest.py
          node --check panel/web/app.js
          node --check panel/web/remember.js

      - name: Run v7 tests
        run: |
          python -m unittest tests.test_gateway_v71 -v
          python -m unittest tests.test_gateway_v712 -v

      - name: Run standalone self-test
        run: python panel/gateway/entrypoint.py --self-test

      - name: Validate installer and privilege boundary
        run: |
          bash -n install-panel-v71.sh
          bash -n install-panel-v712.sh
          grep -q 'PANEL_BIND:-0.0.0.0' install-panel-v712.sh
          grep -q 'IWAN_ALLOW_PUBLIC_BIND:-1' install-panel-v712.sh
          grep -q 'chown -R "$PANEL_USER:$PANEL_GROUP" "$DATA_DIR"' install-panel-v712.sh
          grep -q 'ufw allow "${PANEL_PORT}/tcp"' install-panel-v712.sh
          grep -q 'User=root' install-panel-v71.sh
          grep -q 'User=\$PANEL_USER' install-panel-v71.sh
          grep -q 'RuntimeDirectoryMode=0755' install-panel-v71.sh
          grep -q 'LEGACY_DIR=' install-panel-v71.sh
          grep -q 'runtime_v712' panel/gateway/entrypoint.py
          grep -q 'helper 拒绝启动' panel/gateway/entrypoint.py
          grep -q 'SO_PEERCRED' panel/gateway/helper.py
          grep -q 'FileLock' panel/gateway/helper.py
          grep -q 'iwan_remember' panel/gateway/runtime_v712.py
          ! grep -R 'panel/v6' panel/gateway
          ! grep -R 'subprocess' panel/gateway/runtime.py panel/gateway/runtime_v712.py panel/gateway/application.py
          test "$(sha256sum release/iwan-release-ed25519-public.pem | awk '{print $1}')" = "ebc439b79669d73666d10989b5dfe9438976c6f5f4f9a5064cc3ab02edbdc25e"

      - name: Test Ed25519 manifest signing and tamper detection
        run: |
          work="$(mktemp -d)"
          openssl genpkey -algorithm Ed25519 -out "$work/private.pem"
          openssl pkey -in "$work/private.pem" -pubout -out "$work/public.pem"
          cat >"$work/manifest.json" <<'JSON'
          {
            "schema": 2,
            "version": "7.1.2-test",
            "ref": "0000000000000000000000000000000000000000",
            "files": []
          }
          JSON
          python tools/release_manifest.py sign "$work/manifest.json" "$work/private.pem" --key-id ci-test
          python tools/release_manifest.py verify "$work/manifest.json" "$work/public.pem"
          python - "$work/manifest.json" <<'PY'
          import json,sys
          path=sys.argv[1]
          value=json.load(open(path,encoding='utf-8'))
          value['version']='7.1.2-tampered'
          json.dump(value,open(path,'w',encoding='utf-8'),ensure_ascii=False,indent=2)
          PY
          ! python tools/release_manifest.py verify "$work/manifest.json" "$work/public.pem"

      - name: Build unsigned candidate manifest
        run: |
          python tools/build_release_manifest.py \
            --version 7.1.2 \
            --ref "$GITHUB_SHA" \
            --output /tmp/panel-release-unsigned.json

      - name: Upload unsigned candidate manifest
        uses: actions/upload-artifact@v4
        with:
          name: panel-release-unsigned-v7.1.2
          path: /tmp/panel-release-unsigned.json
          if-no-files-found: error
          retention-days: 1

      - name: Assemble unified flat release
        run: |
          python - <<'PY'
          import pathlib, shutil, subprocess, tempfile
          with tempfile.TemporaryDirectory() as td:
              root=pathlib.Path(td)
              shutil.copy2('panel/gateway/entrypoint.py',root/'app.py')
              shutil.copy2('panel/app.py',root/'core.py')
              shutil.copy2('panel/iwan_compat.py',root/'iwan_compat.py')
              shutil.copytree('panel/gateway',root/'gateway')
              web=root/'web'; web.mkdir()
              sources={
                'panel/web/index.html':'index.html',
                'panel/web/app.css':'app.css',
                'panel/web/app.js':'app.js',
                'panel/web/remember.css':'remember.css',
                'panel/web/remember.js':'remember.js',
              }
              for source,target in sources.items(): shutil.copy2(source,web/target)
              html=(web/'index.html').read_text(encoding='utf-8')
              assert '/assets/app.css' in html and '/assets/app.js' in html
              assert not any('panel/v6' in source for source in sources)
              subprocess.check_call(['python',str(root/'app.py'),'--self-test'])
              forbidden=('reliablecore','autosavecore','routingcore','statuscore','interactioncore','authcore','moscore')
              runtime='\n'.join(path.read_text() for path in (root/'gateway').glob('*.py'))
              assert not any(f'import {name}' in runtime or f'from {name}' in runtime for name in forbidden)
          print('unified flat release assembly passed')
          PY
