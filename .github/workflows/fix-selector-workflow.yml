name: fix-selector-workflow

on:
  push:
    paths:
      - .github/workflows/fix-selector-workflow.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keep API process alive for helper test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/apply-selector-routing.yml')
          text = path.read_text()
          old = '''          python3 - <<'PY'
          import json
          after = json.load(open('/tmp/after.json'))
          assert after['now'] == 'blocked', after
          PY

      - name: Verify panel switch helper
        run: |
          IWAN_DATA="$(mktemp -d)" IWAN_CLASH_API="http://127.0.0.1:19090" python3 - <<'PY'
          import sys
          sys.path.insert(0, 'app')
          import app

          previous = {key: 'direct' for key in app.SELECTOR_KEYS}
          desired = dict(previous)
          desired['ai'] = 'blocked'
          changed = app.switch_routing(previous, desired)
          assert changed == []
          desired['ai'] = 'direct'
          changed = app.switch_routing(previous, desired)
          assert changed == ['ai']
          PY

      - name: Confirm only intended files changed
'''
          new = '''          python3 - <<'PY'
          import json
          after = json.load(open('/tmp/after.json'))
          assert after['now'] == 'blocked', after
          PY
          IWAN_DATA="$(mktemp -d)" IWAN_CLASH_API="http://127.0.0.1:19090" python3 - <<'PY'
          import sys
          sys.path.insert(0, 'app')
          import app

          previous = {key: 'direct' for key in app.SELECTOR_KEYS}
          desired = dict(previous)
          desired['ai'] = 'blocked'
          changed = app.switch_routing(previous, desired)
          assert changed == []
          desired['ai'] = 'direct'
          changed = app.switch_routing(previous, desired)
          assert changed == ['ai']
          PY

      - name: Confirm only intended files changed
'''
          assert old in text
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit workflow fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/apply-selector-routing.yml
          git commit -m "ci: keep selector API alive during helper test"
          git push
