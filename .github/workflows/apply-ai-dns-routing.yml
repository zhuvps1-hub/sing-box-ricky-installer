name: apply-ai-dns-routing

on:
  push:
    paths:
      - .github/workflows/apply-ai-dns-routing.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch only AI identification
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/app.py')
          text = path.read_text()

          rule_set_anchor = ']\nLOCK = threading.Lock()'
          rule_set_insert = ''' ]
          AI_RULE_SET = {
              "type": "remote",
              "tag": "geosite-ai",
              "format": "binary",
              "url": "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-ai-!cn.srs",
              "download_detour": "direct",
          }
          LOCK = threading.Lock()'''.replace('          ', '')

          old_rules = '''    rules: list[dict] = [{"ip_is_private": True, "outbound": "direct"}]
              rules.append({"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]})
              for key in ["ai", "youtube", "netflix", "tiktok", "telegram", "google"]:
                  rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}
                  if key == "telegram":
                      rule["ip_cidr"] = TG_CIDR
                  rules.append(rule)
          '''
          new_rules = '''    rules: list[dict] = [
                  {"inbound": ["iwan-in"], "port": 53, "action": "hijack-dns"},
                  {"ip_is_private": True, "outbound": "direct"},
                  {"rule_set": ["geosite-cn", "geoip-cn"], "outbound": routing["cn"]},
                  {"rule_set": "geosite-ai", "outbound": routing["ai"]},
                  {"domain_suffix": DOMAINS["ai"], "outbound": routing["ai"]},
              ]
              for key in ["youtube", "netflix", "tiktok", "telegram", "google"]:
                  rule: dict = {"domain_suffix": DOMAINS[key], "outbound": routing[key]}
                  if key == "telegram":
                      rule["ip_cidr"] = TG_CIDR
                  rules.append(rule)
          '''

          old_return = '''    return {
                  "log": {"level": "info", "timestamp": True},
                  "inbounds": inbounds,
          '''
          new_return = '''    return {
                  "log": {"level": "info", "timestamp": True},
                  "dns": {
                      "servers": [{"type": "local", "tag": "dns-upstream", "prefer_go": True}],
                      "final": "dns-upstream",
                      "strategy": "prefer_ipv4",
                      "reverse_mapping": True,
                  },
                  "inbounds": inbounds,
          '''

          if rule_set_anchor not in text:
              raise SystemExit('CN rule-set anchor not found; refusing unrelated changes')
          if old_rules not in text:
              raise SystemExit('Stable routing block not found; refusing unrelated changes')
          if old_return not in text:
              raise SystemExit('Config return block not found; refusing unrelated changes')
          if '"rule_set": CN_RULES,' not in text:
              raise SystemExit('Rule-set output block not found')

          text = text.replace(rule_set_anchor, rule_set_insert, 1)
          text = text.replace(old_rules, new_rules, 1)
          text = text.replace(old_return, new_return, 1)
          text = text.replace('"rule_set": CN_RULES,', '"rule_set": [*CN_RULES, AI_RULE_SET],', 1)
          path.write_text(text)
          PY

      - name: Syntax checks
        run: |
          python -m py_compile app/app.py app/importers.py
          bash -n install.sh
          git diff --check

      - name: Build representative HK default, SG AI and TG routing config
        env:
          PYTHONPATH: app
          IWAN_DATA: /tmp/iwan-gateway-test
        run: |
          python - <<'PY'
          import json
          import app as gateway

          routing = {key: 'HK' for key in gateway.CATS}
          routing['ai'] = 'SG'
          routing['telegram'] = 'TG'
          routing['default'] = 'HK'
          state = {
              'nodes': [
                  {
                      'tag': tag,
                      'type': 'shadowsocks',
                      'server': '127.0.0.1',
                      'port': port,
                      'outbound': {
                          'type': 'shadowsocks',
                          'server': '127.0.0.1',
                          'server_port': port,
                          'method': 'aes-128-gcm',
                          'password': 'verification-password',
                      },
                      'source': 'CI verification',
                  }
                  for tag, port in [('HK', 1443), ('SG', 2443), ('TG', 3443)]
              ],
              'routing': routing,
              'iwan': {
                  'enabled': True,
                  'listen': '::',
                  'port': 8000,
                  'pool': '10.10.10.0/24',
                  'mtu': 1400,
                  'username': 'verification-user',
                  'password': 'verification-password',
              },
          }
          config = gateway.build(state)
          rules = config['route']['rules']
          assert not any(rule.get('action') == 'sniff' for rule in rules)
          assert rules[0] == {'inbound': ['iwan-in'], 'port': 53, 'action': 'hijack-dns'}
          assert config['dns']['reverse_mapping'] is True
          assert config['dns']['servers'][0]['type'] == 'local'
          assert config['route']['final'] == 'HK'
          ai_rule = next(rule for rule in rules if rule.get('rule_set') == 'geosite-ai')
          assert ai_rule['outbound'] == 'SG'
          tg_rule = next(rule for rule in rules if rule.get('ip_cidr') == gateway.TG_CIDR)
          assert tg_rule['outbound'] == 'TG'
          assert any(item.get('tag') == 'geosite-ai' for item in config['route']['rule_set'])
          with open('/tmp/ai-dns-routing-config.json', 'w') as fh:
              json.dump(config, fh, ensure_ascii=False, indent=2)
          PY

      - name: Validate rule-set URL and Ricky-Hao core
        run: |
          curl -fL --retry 3 -o /tmp/category-ai.srs \
            'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-ai-!cn.srs'
          test -s /tmp/category-ai.srs
          curl -fL --retry 3 -o /tmp/sing-box.tar.gz \
            https://github.com/Ricky-Hao/sing-box/releases/download/v1.13.13-rickyhao.22/sing-box-1.13.13-rickyhao.22-linux-amd64.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          SB_BIN=$(find /tmp -type f -name sing-box -perm -u+x | head -n 1)
          if [ -z "$SB_BIN" ]; then
            SB_BIN=$(find /tmp -type f -name sing-box | head -n 1)
            chmod +x "$SB_BIN"
          fi
          "$SB_BIN" version | tee /tmp/sing-box-version.txt
          grep -q 'with_iwan' /tmp/sing-box-version.txt
          timeout 30s "$SB_BIN" check -c /tmp/ai-dns-routing-config.json

      - name: Ensure only app.py changed
        run: |
          test "$(git diff --name-only | tr -d '\r')" = "app/app.py"

      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/app.py
          git commit -m "fix: map iWAN DNS for reliable AI routing"
          git push
