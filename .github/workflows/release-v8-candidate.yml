name: release-v8-candidate

on:
  pull_request:
    paths:
      - "panel/**"
      - "install-panel-v712.sh"
      - "tools/build_v8_manifest.py"
      - ".github/workflows/release-v8-candidate.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build v8.0.0 immutable manifest
        env:
          RELEASE_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          python tools/build_v8_manifest.py \
            --version 8.0.0 \
            --ref "$RELEASE_REF" \
            --output panel-release-v8-unsigned.json
          python - <<'PY'
          import json
          data=json.load(open('panel-release-v8-unsigned.json',encoding='utf-8'))
          assert data['version']=='8.0.0'
          assert any(x['target']=='gateway/runtime_v8.py' for x in data['files'])
          assert any(x['target']=='web/v8.css' for x in data['files'])
          assert any(x['target']=='web/v8.js' for x in data['files'])
          print(data['ref'], len(data['files']))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: panel-release-unsigned-v8.0.0
          path: panel-release-v8-unsigned.json
          if-no-files-found: error
          retention-days: 1
