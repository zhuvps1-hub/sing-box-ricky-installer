<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>iWAN Gateway</title><link rel="stylesheet" href="/style.css"></head><body><div id="login" class="center hidden"><form class="card login" onsubmit="login(event)"><h1>iWAN Gateway</h1><p>轻量 · 高效 · 秒生效</p><input id="lu" value="admin" placeholder="用户名" autocomplete="username"><input id="lp" type="password" placeholder="密码" autocomplete="current-password"><button>登录</button><div id="le" class="err"></div></form></div><div id="app" class="hidden"><header><div><b>iWAN Gateway</b><small id="svc">读取中</small></div><button class="ghost" onclick="logout()">退出</button></header><main><nav><button data-p="home" class="active">首页</button><button data-p="nodes">节点</button><button data-p="routing">分流</button><button data-p="iwan">iWAN</button><button data-p="settings">设置</button></nav><section id="home" class="page active"><h2>运行状态</h2><div class="grid"><div class="card"><span>sing-box</span><strong id="hsvc">—</strong></div><div class="card"><span>节点数量</span><strong id="hcount">0</strong></div><div class="card"><span>iWAN 端口</span><strong id="hport">8000</strong></div><div class="card"><span>默认出口</span><strong id="hdefault">Direct</strong></div></div><h2>当前分流</h2><div id="hroute" class="list"></div></section><section id="nodes" class="page"><div class="title"><h2>节点</h2><button onclick="addNode()">＋ 添加</button></div><div id="nodeList"></div></section><section id="routing" class="page"><h2>分流</h2><p class="muted">选择后点击底部“应用配置”，后台自动快速重载。</p><div id="routeList" class="list"></div></section><section id="iwan" class="page"><h2>iWAN</h2><div class="form"><label><span>启用</span><input id="ie" type="checkbox"></label><label><span>监听地址</span><input id="il"></label><label><span>端口</span><input id="ip" type="number"></label><label><span>地址池</span><input id="ipool"></label><label><span>MTU</span><input id="imtu" type="number"></label><label><span>用户名</span><input id="iu"></label><label><span>密码</span><input id="iwp" type="password" placeholder="留空保持不变"></label></div></section><section id="settings" class="page"><h2>账号安全</h2><div class="form"><label><span>用户名</span><input id="su"></label><label><span>原密码</span><input id="so" type="password"></label><label><span>新密码</span><input id="sn" type="password" placeholder="至少 8 位"></label><button onclick="changePassword()">保存账号</button></div></section></main><footer><span id="msg">配置修改后点击应用</span><button id="apply" onclick="applyAll()">应用配置</button></footer></div><script src="/app.js"></script></body></html>
